databases:
  - name: chinese-learning-db
    databaseName: cwdb
    user: cwuser
    plan: free

services:
  - type: web
    name: chinese-learning-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chinese-learning-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # デプロイ後にフロントエンドのURLを設定してください

  - type: web
    runtime: static
    name: chinese-learning-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # デプロイ後にバックエンドのURLを設定してください
